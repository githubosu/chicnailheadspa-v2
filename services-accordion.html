<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Services &amp; Pricing — Chic Nail &amp; Head Spa</title>
<link rel="icon" href="./assets/favicon.png">
<link rel="stylesheet" href="./styles.css">
<link rel="stylesheet" href="https://unpkg.com/@phosphor-icons/web@2.1.1/src/light/style.css">
<link rel="stylesheet" href="https://unpkg.com/@phosphor-icons/web@2.1.1/src/fill/style.css">
<style>
  html, body { margin: 0; background: var(--surface-page); }
  #root { min-height: 100vh; }
  @keyframes evoFade { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
  @keyframes evoBob { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(5px); } }
</style>
</head>
<body>
<div id="root"></div>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="./_ds_bundle.js"></script>
<script src="./menu-data.js"></script>
<!-- Shared chrome (EvoHeader / EvoFooter) lives in EvolvedHome.jsx -->
<script type="text/babel" src="EvolvedHome.jsx"></script>
<script type="text/babel">
const BOOK_TEL = 'tel:+16143899999';
const HERO_IMG = './assets/services-hero.jpg';
const HERO_FALLBACK = 'https://chicnailheadspa.com/assets/images/gallery/salon-2.png';

const CATS = [
  { key: 'pedi',    label: 'Pedicure',   sub: 'From $48' },
  { key: 'mani',    label: 'Manicure',   sub: 'From $20' },
  { key: 'acrylic', label: 'Acrylic',    sub: 'From $56' },
  { key: 'gelx',    label: 'Gel-X',      sub: 'From $60' },
  { key: 'dip',     label: 'Dip Powder', sub: 'From $56' },
  { key: 'headspa', label: 'Head Spa',   sub: 'From $45' },
  { key: 'wax',     label: 'Waxing',     sub: 'From $9'  },
  { key: 'kids',    label: 'Kids',       sub: 'From $12', note: 'Ages 10 & under.' },
  { key: 'extras',  label: 'Extras',     sub: 'From $3',  note: 'Add to any service.' },
];

function useMobileSA(bp) {
  const q = '(max-width:' + (bp || 760) + 'px)';
  const [m, setM] = React.useState(() => window.matchMedia ? window.matchMedia(q).matches : false);
  React.useEffect(() => {
    const mq = window.matchMedia(q);
    const fn = () => setM(mq.matches);
    fn(); mq.addEventListener('change', fn);
    return () => mq.removeEventListener('change', fn);
  }, [q]);
  return m;
}

function SATag({ variant, children }) {
  const map = {
    accent:  { bg: 'var(--accent-tint)',    color: 'var(--accent)' },
    gilt:    { bg: 'var(--gilt-soft)',       color: 'var(--honey-600)' },
    reserve: { bg: 'rgba(122,37,53,.08)',    color: '#7a2535' },
  };
  const s = map[variant] || map.accent;
  return <span style={{ background: s.bg, color: s.color, fontFamily: 'var(--font-sans)', fontSize: 10, fontWeight: 600, letterSpacing: '.14em', textTransform: 'uppercase', padding: '3px 8px', borderRadius: 'var(--radius-pill)', whiteSpace: 'nowrap' }}>{children}</span>;
}

/* ── Hero (photo + scrim; sits under the transparent EvoHeader) ────────── */
function SAHero() {
  const m = useMobileSA();
  return (
    <section style={{ position: 'relative', minHeight: m ? 380 : 480, background: 'var(--espresso-900)', overflow: 'hidden', display: 'flex', alignItems: 'flex-end' }}>
      <img src={HERO_IMG} alt="" aria-hidden="true"
        onError={(e) => { e.currentTarget.src = HERO_FALLBACK; e.currentTarget.onerror = null; }}
        style={{ position: 'absolute', inset: 0, width: '100%', height: '100%', objectFit: 'cover' }} />
      <div style={{ position: 'absolute', inset: 0, background: 'linear-gradient(180deg, rgba(42,29,21,0.58) 0%, rgba(42,29,21,0.40) 38%, rgba(42,29,21,0.85) 100%)' }} />
      <div style={{ position: 'relative', maxWidth: 'var(--container-max)', margin: '0 auto', width: '100%', padding: m ? '0 24px 40px' : '0 var(--gutter) 60px' }}>
        <div style={{ fontFamily: 'var(--font-sans)', fontWeight: 500, fontSize: 12, letterSpacing: '.3em', textTransform: 'uppercase', color: 'var(--honey-300)', marginBottom: 14 }}>The Menu</div>
        <h1 style={{ fontFamily: 'var(--font-display)', fontWeight: 500, fontSize: m ? 46 : 72, lineHeight: 1.02, color: 'var(--cream-50)', margin: 0, letterSpacing: '-0.015em' }}>
          Services &amp; <em style={{ fontStyle: 'italic', color: 'var(--honey-300)' }}>pricing</em>
        </h1>
        <p style={{ fontFamily: 'var(--font-sans)', fontSize: m ? 15 : 18, lineHeight: 1.6, color: 'var(--cream-100)', maxWidth: 480, margin: '14px 0 0' }}>
          A short, considered list — every treatment unhurried. Prices are starting rates; ask us for a personalized quote.
        </p>
      </div>
    </section>
  );
}

function AccordionRow({ cat, isOpen, onToggle }) {
  const m = useMobileSA();
  const items = window.CNHS_MENU.full.filter((s) => s.cat === cat.key);
  const contentRef = React.useRef(null);
  const [height, setHeight] = React.useState(0);
  React.useEffect(() => {
    if (contentRef.current) setHeight(isOpen ? contentRef.current.scrollHeight : 0);
  }, [isOpen, items.length]);

  return (
    <div style={{ borderBottom: '1px solid var(--border-subtle)' }}>
      {/* Trigger row — headers 20% smaller than the original (34→27, 28→22) */}
      <button onClick={onToggle} style={{ width: '100%', background: 'none', border: 'none', cursor: 'pointer', padding: m ? '20px 0' : '22px 0', display: 'flex', alignItems: 'center', gap: 16, textAlign: 'left' }}>
        <div style={{ flex: 1, display: 'flex', alignItems: 'baseline', gap: 12, flexWrap: 'wrap' }}>
          <span style={{ fontFamily: 'var(--font-display)', fontStyle: 'italic', fontSize: m ? 22 : 27, color: isOpen ? 'var(--accent)' : 'var(--text-strong)', transition: 'color 200ms ease', lineHeight: 1 }}>
            {cat.label}
          </span>
          <span style={{ fontFamily: 'var(--font-sans)', fontSize: 12, color: cat.comingSoon ? 'var(--honey-500)' : 'var(--text-muted)', letterSpacing: '.06em' }}>{cat.sub}</span>
          {!cat.comingSoon && <span style={{ fontFamily: 'var(--font-sans)', fontSize: 11, color: 'var(--text-muted)' }}>{items.length} services</span>}
        </div>
        {!cat.comingSoon && (
          <div style={{ width: 28, height: 28, borderRadius: '50%', border: '1px solid ' + (isOpen ? 'var(--accent)' : 'var(--border-default)'), display: 'flex', alignItems: 'center', justifyContent: 'center', flexShrink: 0, transition: 'border-color 200ms ease, transform 200ms ease', transform: isOpen ? 'rotate(45deg)' : 'none' }}>
            <i className="ph-light ph-plus" style={{ fontSize: 13, color: isOpen ? 'var(--accent)' : 'var(--text-muted)' }} />
          </div>
        )}
        {cat.comingSoon && (
          <span style={{ fontFamily: 'var(--font-sans)', fontSize: 11, fontWeight: 600, letterSpacing: '.16em', textTransform: 'uppercase', color: 'var(--honey-500)', background: 'var(--gilt-soft)', padding: '5px 12px', borderRadius: 'var(--radius-pill)', whiteSpace: 'nowrap' }}>Soon</span>
        )}
      </button>

      {!cat.comingSoon && (
        <div ref={contentRef} style={{ height: height + 'px', overflow: 'hidden', transition: 'height 280ms cubic-bezier(.4,0,.2,1)' }}>
          <div style={{ paddingBottom: 24 }}>
            {items.map((item, i) => (
              <div key={item.name} style={{ display: 'flex', alignItems: 'flex-start', gap: 12, padding: '12px 0', borderBottom: i < items.length - 1 ? '1px solid var(--border-subtle)' : 'none' }}>
                <div style={{ flex: 1 }}>
                  <div style={{ display: 'flex', alignItems: 'center', gap: 8, flexWrap: 'wrap' }}>
                    <span style={{ fontFamily: 'var(--font-sans)', fontWeight: 500, fontSize: 14.5, color: 'var(--text-strong)' }}>{item.name}</span>
                    {item.dur && <span style={{ fontFamily: 'var(--font-sans)', fontSize: 11.5, color: 'var(--text-muted)' }}>{item.dur}</span>}
                    {item.tag && <SATag variant={item.tagV}>{item.tag}</SATag>}
                  </div>
                  {item.blurb && <p style={{ fontFamily: 'var(--font-sans)', fontWeight: 300, fontSize: 13, lineHeight: 1.55, color: 'var(--text-muted)', margin: '4px 0 0' }}>{item.blurb}</p>}
                </div>
                <span style={{ fontFamily: 'var(--font-display)', fontSize: 21, color: 'var(--accent)', whiteSpace: 'nowrap', paddingTop: 1 }}>{item.price}</span>
              </div>
            ))}
            {cat.note && (
              <p style={{ fontFamily: 'var(--font-sans)', fontStyle: 'italic', fontSize: 12.5, color: 'var(--text-muted)', lineHeight: 1.6, margin: '16px 0 12px', paddingTop: 14, borderTop: '1px dotted var(--border-default)' }}>
                <i className="ph-light ph-star" style={{ color: 'var(--gilt)', marginRight: 6 }} />{cat.note}
              </p>
            )}
            <div style={{ marginTop: 16 }}>
              <a href={BOOK_TEL} style={{ display: 'inline-flex', alignItems: 'center', gap: 6, fontFamily: 'var(--font-sans)', fontSize: 12.5, fontWeight: 500, color: 'var(--accent)', textDecoration: 'none', letterSpacing: '.02em' }}>
                Book now <i className="ph-light ph-arrow-right" style={{ fontSize: 14 }} />
              </a>
            </div>
          </div>
        </div>
      )}
    </div>
  );
}

function ServicesAccordionPage() {
  const [ready, setReady] = React.useState(!!(window.ChicNailHeadSpaDesignSystem_843afb && window.EvoHeader && window.CNHS_MENU));
  const [open, setOpen] = React.useState('pedi');
  const m = useMobileSA();
  React.useEffect(() => {
    if (ready) return;
    const t = setInterval(() => { if (window.ChicNailHeadSpaDesignSystem_843afb && window.EvoHeader && window.CNHS_MENU) { setReady(true); clearInterval(t); } }, 50);
    return () => clearInterval(t);
  }, [ready]);
  if (!ready) return null;
  const toggle = (key) => setOpen((o) => o === key ? null : key);
  const c = window.CNHS_MENU.contact;
  const EvoHeader = window.EvoHeader, EvoFooter = window.EvoFooter;

  return (
    <div style={{ background: 'var(--surface-page)' }}>
      <EvoHeader />
      <SAHero />
      <main style={{ maxWidth: 720, margin: '0 auto', padding: m ? '32px 20px 80px' : '48px 0 100px' }}>
        {CATS.map((cat) => (
          <AccordionRow key={cat.key} cat={cat} isOpen={open === cat.key} onToggle={() => toggle(cat.key)} />
        ))}
        <p style={{ fontFamily: 'var(--font-sans)', fontStyle: 'italic', fontSize: 12.5, color: 'var(--text-muted)', margin: '28px 0 0', lineHeight: 1.6 }}>
          All prices are starting rates. Call {c.phone} for a personalized quote.
        </p>
      </main>
      <EvoFooter />
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<ServicesAccordionPage />);
</script>
</body>
</html>
