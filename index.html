<!-- @dsCard group="Website" viewport="1280x760" name="Marketing & booking site" subtitle="Home → Services → Booking → Confirmation — interactive" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Chic Nail &amp; Head Spa</title>
<link rel="icon" href="./assets/favicon.png">
<link rel="stylesheet" href="./styles.css">
<link rel="stylesheet" href="https://unpkg.com/@phosphor-icons/web@2.1.1/src/light/style.css">
<link rel="stylesheet" href="https://unpkg.com/@phosphor-icons/web@2.1.1/src/bold/style.css">
<style>
  html, body { margin: 0; background: var(--surface-page); }
  #root { min-height: 100vh; }
</style>
</head>
<body>
<div id="root"></div>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="./_ds_bundle.js"></script>
<script src="./menu-data.js"></script>
<script type="text/babel" src="chrome.jsx"></script>
<script type="text/babel" src="Home.jsx"></script>
<script type="text/babel" src="Services.jsx"></script>
<script type="text/babel" src="Booking.jsx"></script>
<script type="text/babel" src="Confirmation.jsx"></script>
<script type="text/babel">
  const { Header, Footer } = window;
  function App() {
    const [route, setRoute] = React.useState('home');
    const [booking, setBooking] = React.useState(null);
    const nav = (r) => { setRoute(r); window.scrollTo({ top: 0 }); };
    const book = (b) => { setBooking(b); nav('confirmation'); };

    let screen;
    if (route === 'services') screen = <window.Services onNav={nav} />;
    else if (route === 'booking') screen = <window.Booking onBook={book} />;
    else if (route === 'confirmation') screen = <window.Confirmation booking={booking} onNav={nav} />;
    else screen = <window.Home onNav={nav} />;

    const current = route === 'services' ? 'services' : route === 'home' ? 'home' : '';
    return (
      <>
        <Header onNav={nav} current={current} />
        {screen}
        <Footer onNav={nav} />
      </>
    );
  }
  ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
